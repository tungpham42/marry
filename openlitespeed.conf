virtualHost marry.io.vn-80 {
  user                    marry
  group                   marry
  vhRoot                  /home/marry
  allowSymbolLink         1
  enableScript            1
  restrained              1
  setUIDMode              2
  # listeners  listener1, listener2, listener3
  listeners 45-251-112-84-80
  #VirtualHost config settings
  docRoot                   /home/marry/domains/marry.io.vn/public_html/public
  vhDomain                  marry.io.vn
  vhAliases                 *.marry.io.vn
  adminEmails               webmaster@marry.io.vn
  enableGzip                1
  enableIpGeo               1
  errorlog /var/log/httpd/domains/marry.io.vn.error.log {
    useServer               0
    logLevel                NOTICE
    rollingSize             0
  }
  accesslog /var/log/httpd/domains/marry.io.vn.log {
    useServer               0
    logFormat               %a %l %u %t "%r" %>s %O "%{Referer}i" "%{User-Agent}i"
    logHeaders              5
    rollingSize             0
  }
  accesslog /var/log/httpd/domains/marry.io.vn.bytes {
    useServer               0
    logFormat               %O %I
    rollingSize             0
  }
  phpIniOverride {
    php_admin_flag engine ON
    php_admin_value sendmail_path "/usr/sbin/sendmail -t -i -f marry@marry.io.vn"
    php_admin_value open_basedir "/home/marry/:/tmp:/var/tmp:/opt/alt/php84/usr/share/pear/:/dev/urandom:/usr/local/lib/php/:/usr/local/php84/lib/php/"
    php_value session.save_path "/home/marry/tmp"
    php_admin_value mail.log /home/marry/.php/php-mail.log
  }
  extProcessor dainternal {
      type    proxy
      address uds://usr/local/directadmin/shared/internal.sock
  }
  rewrite  {
    enable                  1
    autoLoadHtaccess        1
    # Mail auto configuration (Thunderbird)
    RewriteRule ^/\.well-known/autoconfig/mail/config-v1\.1\.xml$ http://dainternal/$0 [P,L]
  }
  context /cgi-bin/ {
    allowBrowse 1
    type cgi
  }
  # include aliases
  include /etc/openlitespeed/httpd-alias.conf
  bubbleWrap 2
}

